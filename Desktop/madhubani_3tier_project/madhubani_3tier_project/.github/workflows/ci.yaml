name: Madhubani Three-Tier CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    name: Frontend check ho raha hai
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify frontend files
        run: |
          test -f frontend/index.html
          test -f frontend/style.css
          test -f frontend/app.js
          test -f frontend/nginx.conf
          test -f frontend/Dockerfile

      - name: Check frontend JavaScript syntax
        run: node --check frontend/app.js

  backend-ci:
    name: Backend ho raha hai
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend JavaScript syntax
        run: node --check server.js

  docker-build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    needs:
      - frontend-ci
      - backend-ci

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max